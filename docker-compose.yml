services:
  web-client:
    build:
      context: ./web-client
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - identity-service
      - lobby-service
      - chat-service

  identity-service:
    build:
      context: ./identity-service
      dockerfile: Dockerfile
    expose:
      - "8080"

  lobby-service:
    build:
      context: ./lobby-service
      dockerfile: Dockerfile
    expose:
      - "8081"
    environment:
      - IDENTITY_SERVICE_URL=http://identity-service:8080
    depends_on:
      - identity-service

  chat-service:
    build:
      context: ./chat-service
      dockerfile: Dockerfile
    expose:
      - "8082"
    depends_on:
      - identity-service
